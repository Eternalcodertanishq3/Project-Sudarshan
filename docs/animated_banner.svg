<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" height="100%">
  <defs>
    <style>
      @keyframes drift {
        0% { transform: translateX(0); }
        100% { transform: translateX(-1200px); }
      }
      @keyframes orbit {
        0% { transform: translate(0, 0) rotate(0deg); }
        50% { transform: translate(800px, 150px) rotate(15deg); }
        100% { transform: translate(1200px, -50px) rotate(30deg); }
      }
      @keyframes fly {
        0% { transform: translate(-100px, 250px); }
        50% { transform: translate(600px, 200px); }
        100% { transform: translate(1300px, 250px); }
      }
      @keyframes radar {
        0% { opacity: 0; transform: scale(0.5); }
        50% { opacity: 0.5; transform: scale(1.5); }
        100% { opacity: 0; transform: scale(2.5); }
      }
      @keyframes pulseText {
        0%, 100% { opacity: 1; text-shadow: 0 0 10px #00aaff; }
        50% { opacity: 0.8; text-shadow: 0 0 20px #00aaff; }
      }
      @keyframes wave {
        0% { transform: translateX(0); }
        100% { transform: translateX(-100px); }
      }
      .star { fill: #fff; animation: pulseText 2s infinite; }
      .bg { fill: #000510; }
      .grid { stroke: rgba(0, 170, 255, 0.1); stroke-width: 1; }
      .title { font-family: 'Courier New', monospace; font-size: 64px; fill: #fff; font-weight: bold; text-shadow: 0 0 15px #00aaff; }
      .subtitle { font-family: 'Courier New', monospace; font-size: 24px; fill: #00aaff; letter-spacing: 5px; }
      .land { fill: #001a00; stroke: #00ff00; stroke-width: 2; }
      .sea { fill: #000a20; stroke: #00aaff; stroke-width: 1; opacity: 0.8; }
    </style>
    
    <!-- Stars Pattern -->
    <pattern id="stars" width="200" height="200" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="50" r="1" class="star" style="animation-delay: 0s" />
      <circle cx="150" cy="30" r="1.5" class="star" style="animation-delay: 0.5s" />
      <circle cx="80" cy="120" r="1" class="star" style="animation-delay: 1s" />
      <circle cx="180" cy="180" r="2" class="star" style="animation-delay: 1.5s" />
      <circle cx="10" cy="190" r="1" class="star" style="animation-delay: 0.2s" />
    </pattern>
    
    <!-- Grid Pattern -->
    <pattern id="cyber-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" class="grid"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" class="bg" />
  
  <!-- Cyber Grid -->
  <rect width="1200" height="400" fill="url(#cyber-grid)" />
  
  <!-- Moving Starfield -->
  <g style="animation: drift 60s linear infinite">
    <rect width="2400" height="400" fill="url(#stars)" />
  </g>

  <!-- Land & Sea Environments -->
  <path d="M 0 350 Q 150 300 300 350 T 600 350 L 600 400 L 0 400 Z" class="land" />
  <path d="M 500 320 Q 600 280 700 330 T 900 350 T 1200 360 L 1200 400 L 500 400 Z" class="land" />
  
  <!-- Moving Sea Waves -->
  <g style="animation: wave 10s linear infinite">
    <path d="M -100 370 Q 50 360 200 370 T 500 370 T 800 370 T 1100 370 T 1400 370 L 1400 400 L -100 400 Z" class="sea" />
    <path d="M -50 380 Q 100 375 250 380 T 550 380 T 850 380 T 1150 380 T 1450 380 L 1450 400 L -50 400 Z" class="sea" style="opacity: 0.5" />
  </g>

  <!-- Satellite (Space) -->
  <g style="animation: orbit 20s linear infinite;">
    <!-- Sat Body -->
    <rect x="-15" y="-5" width="30" height="10" fill="#bbb" />
    <!-- Sat Solar Panels -->
    <rect x="-35" y="-15" width="20" height="30" fill="#00aaff" />
    <rect x="15" y="-15" width="20" height="30" fill="#00aaff" />
    <!-- Sat Radar Ping -->
    <circle cx="0" cy="0" r="10" fill="none" stroke="#00aaff" stroke-width="2" style="animation: radar 2s infinite" />
  </g>

  <!-- Drone (Air) -->
  <g style="animation: fly 12s ease-in-out infinite;">
    <path d="M 0 0 L -15 5 L -10 -5 Z" fill="#ff0044" />
    <rect x="-20" y="-1" width="40" height="2" fill="#fff" />
    <!-- Targeting reticle -->
    <circle cx="0" cy="0" r="15" fill="none" stroke="#ff0044" stroke-width="1" stroke-dasharray="2,2" style="animation: pulseText 1s infinite" />
  </g>

  <!-- Sea Vessel (Sea) -->
  <g transform="translate(800, 355)">
    <path d="M -20 0 L 20 0 L 15 10 L -15 10 Z" fill="#444" />
    <rect x="-5" y="-10" width="10" height="10" fill="#666" />
  </g>

  <!-- Foreground Title UI -->
  <g transform="translate(600, 180)" text-anchor="middle">
    <text y="0" class="title" style="animation: pulseText 3s infinite">PROJECT SUDARSHAN</text>
    <text y="40" class="subtitle">QUAD-DOMAIN C4ISR NEXUS</text>
    
    <!-- UI Brackets -->
    <path d="M -400 -60 L -420 -60 L -420 60 L -400 60" fill="none" stroke="#00aaff" stroke-width="3" />
    <path d="M 400 -60 L 420 -60 L 420 60 L 400 60" fill="none" stroke="#00aaff" stroke-width="3" />
  </g>
</svg>
