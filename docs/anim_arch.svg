<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 250" width="100%" height="100%">
  <defs>
    <style>
      @keyframes flow {
        0% { stroke-dashoffset: 100; opacity: 0; }
        50% { opacity: 1; }
        100% { stroke-dashoffset: 0; opacity: 0; }
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.8; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.05); }
      }
      .bg { fill: #0a0a1a; }
      .grid { stroke: rgba(0, 170, 255, 0.1); stroke-width: 1; }
      .node { fill: #001122; stroke: #00aaff; stroke-width: 2; }
      .packet { fill: none; stroke: #00ffcc; stroke-width: 4; stroke-dasharray: 20 80; animation: flow 2s linear infinite; }
      .text { font-family: 'Courier New', monospace; font-size: 20px; fill: #00aaff; font-weight: bold; text-anchor: middle; }
    </style>
    <pattern id="cyber-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" class="grid"/>
    </pattern>
  </defs>

  <rect width="1200" height="250" class="bg" />
  <rect width="1200" height="250" fill="url(#cyber-grid)" />

  <!-- Process Nodes -->
  <g transform="translate(200, 125)">
    <g style="animation: pulse 3s infinite;">
      <rect x="-80" y="-40" width="160" height="80" rx="10" class="node"/>
      <text y="5" class="text">PROCESS A</text>
      <text y="25" class="text" style="font-size: 14px; fill: #888;">[Vision]</text>
    </g>
  </g>

  <g transform="translate(600, 125)">
    <g style="animation: pulse 3s infinite 1s;">
      <rect x="-80" y="-40" width="160" height="80" rx="10" class="node"/>
      <text y="5" class="text">PROCESS B</text>
      <text y="25" class="text" style="font-size: 14px; fill: #888;">[Fusion]</text>
    </g>
  </g>

  <g transform="translate(1000, 125)">
    <g style="animation: pulse 3s infinite 2s;">
      <rect x="-80" y="-40" width="160" height="80" rx="10" class="node"/>
      <text y="5" class="text">PROCESS C</text>
      <text y="25" class="text" style="font-size: 14px; fill: #888;">[Network]</text>
    </g>
  </g>

  <!-- Connection Lines (IPC Queues) -->
  <path d="M 280 125 L 520 125" fill="none" stroke="#223344" stroke-width="4" />
  <path d="M 280 125 L 520 125" class="packet" style="animation-duration: 1.5s;" />

  <path d="M 680 125 L 920 125" fill="none" stroke="#223344" stroke-width="4" />
  <path d="M 680 125 L 920 125" class="packet" style="animation-duration: 1s;" />

  <!-- IPC Labels -->
  <text x="400" y="110" class="text" style="font-size: 16px; fill: #00ffcc;">IPC Queue (30Hz)</text>
  <text x="800" y="110" class="text" style="font-size: 16px; fill: #00ffcc;">IPC Queue (60Hz)</text>
</svg>
