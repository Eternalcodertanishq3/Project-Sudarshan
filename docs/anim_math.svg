<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="100%" height="100%">
  <defs>
    <style>
      .bg { fill: #0a0014; }
      .grid { stroke: #26004d; stroke-width: 1; }
      .math { font-family: 'Times New Roman', serif; font-size: 26px; fill: #d499ff; font-style: italic; }
      .math-glow { fill: #ffb3ff; filter: drop-shadow(0 0 8px #ff00ff); }
      @keyframes pulseOp { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.8; } }
    </style>
    <pattern id="graph" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M50 0 L0 0 L0 50" fill="none" class="grid"/>
    </pattern>
    <linearGradient id="curveGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff00ff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ff00ff" stop-opacity="0.0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="300" class="bg"/>
  <rect width="1200" height="300" fill="url(#graph)"/>

  <!-- Background Math Formulas -->
  <text x="50" y="60" class="math opacity-50">x_{k|k-1} = F_k x_{k-1|k-1}</text>
  <text x="850" y="60" class="math opacity-50">P_{k|k-1} = F_k P_{k-1|k-1} F_k^T + Q_k</text>
  <text x="50" y="260" class="math opacity-50">S_k = H_k P_{k|k-1} H_k^T + R_k</text>
  <text x="850" y="260" class="math opacity-50">K_k = P_{k|k-1} H_k^T S_k^{-1}</text>

  <!-- Central EKF Graphic -->
  <g transform="translate(600, 200)">
    <!-- Axes -->
    <path d="M -300 0 L 300 0" fill="none" stroke="#ffb3ff" stroke-width="2"/>
    <path d="M 0 -150 L 0 50" fill="none" stroke="#ffb3ff" stroke-width="2" stroke-dasharray="5 5"/>
    
    <!-- Gaussian Curve -->
    <path d="M -250 0 C -150 0, -100 -120, 0 -120 C 100 -120, 150 0, 250 0 Z" fill="url(#curveGrad)" stroke="#ff00ff" stroke-width="3" style="animation: pulseOp 3s infinite;"/>
    
    <!-- Moving Target Marker -->
    <circle cx="-150" cy="-20" r="6" fill="#00ffff">
      <animate attributeName="cx" values="-200; 200; -200" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="-5; -80; -5" dur="6s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Highlight Equation -->
    <text x="-120" y="-140" class="math math-glow">P(Threat | Evidence) = \frac{P(E|T)P(T)}{P(E)}</text>
  </g>
</svg>
