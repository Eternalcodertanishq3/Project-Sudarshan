<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="100%" height="100%">
  <defs>
    <style>
      .bg { fill: #001100; }
      .grid { stroke: #003300; stroke-width: 1; }
      .text-title { font-family: 'Courier New', monospace; font-size: 16px; fill: #00ff00; font-weight: bold; text-anchor: middle; }
      @keyframes pulseOp { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
      @keyframes dash { to { stroke-dashoffset: -40; } }
      .stream { fill: none; stroke: #00ff00; stroke-width: 2; stroke-dasharray: 10 10; animation: dash 1s linear infinite; }
    </style>
    <pattern id="hex" width="30" height="51.96" patternUnits="userSpaceOnUse">
      <path d="M15 0 L30 8.66 L30 25.98 L15 34.64 L0 25.98 L0 8.66 Z" fill="none" class="grid"/>
    </pattern>
  </defs>

  <rect width="1200" height="300" class="bg"/>
  <rect width="1200" height="300" fill="url(#hex)"/>

  <!-- Connecting Lines -->
  <path d="M 250 150 L 550 150" class="stream"/>
  <path d="M 250 60 L 550 130" class="stream"/>
  <path d="M 250 240 L 550 170" class="stream"/>
  <path d="M 650 150 L 950 150" class="stream" style="stroke:#00ffff; stroke-width:4;"/>

  <!-- Vision Agent (Top Left) -->
  <g transform="translate(150, 60)">
    <circle cx="0" cy="0" r="40" fill="#002200" stroke="#00ff00" stroke-width="2"/>
    <circle cx="0" cy="0" r="30" fill="none" stroke="#00ff00" stroke-dasharray="10 5">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="10s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="10" fill="#00ff00" style="animation: pulseOp 2s infinite;"/>
    <text y="60" class="text-title">VISION_AI</text>
  </g>

  <!-- Kinematic Agent (Middle Left) -->
  <g transform="translate(150, 150)">
    <circle cx="0" cy="0" r="40" fill="#002200" stroke="#00ff00" stroke-width="2"/>
    <path d="M-20 0 Q0 -30 20 0" fill="none" stroke="#00ff00" stroke-width="3"/>
    <circle cx="0" cy="0" r="45" fill="none" stroke="#00ff00" stroke-dasharray="4 8">
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="8s" repeatCount="indefinite"/>
    </circle>
    <text y="60" class="text-title">KINEMATIC_EKF</text>
  </g>

  <!-- Orbital Agent (Bottom Left) -->
  <g transform="translate(150, 240)">
    <circle cx="0" cy="0" r="40" fill="#002200" stroke="#00ff00" stroke-width="2"/>
    <ellipse cx="0" cy="0" rx="25" ry="10" fill="none" stroke="#00ff00" stroke-width="2" transform="rotate(30)"/>
    <circle cx="0" cy="0" r="5" fill="#00ff00"/>
    <circle cx="0" cy="0" r="35" fill="none" stroke="#00ff00" stroke-dasharray="15 15">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="5s" repeatCount="indefinite"/>
    </circle>
    <text y="45" class="text-title">ORBITAL_SGP4</text>
  </g>

  <!-- Tactical Fusion Agent (Center) -->
  <g transform="translate(600, 150)">
    <circle cx="0" cy="0" r="70" fill="#001a00" stroke="#00ff00" stroke-width="4"/>
    <circle cx="0" cy="0" r="55" fill="none" stroke="#00ff00" stroke-width="2" stroke-dasharray="20 10">
      <animateTransform attributeName="transform" type="rotate" from="0" to="-360" dur="15s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="20" fill="#00ff00" style="animation: pulseOp 1.5s infinite;"/>
    <text y="100" class="text-title" style="font-size: 22px;">BAYESIAN_FUSION</text>
  </g>

  <!-- Output Action (Right) -->
  <g transform="translate(1000, 150)">
    <polygon points="-40,-40 40,-40 60,0 40,40 -40,40 -60,0" fill="#003333" stroke="#00ffff" stroke-width="3"/>
    <text y="5" class="text-title" style="fill: #00ffff;">THREAT_ALERT</text>
    <text y="80" class="text-title" style="fill: #00aaaa;">> WEBSOCKET BROADCAST</text>
  </g>
</svg>
