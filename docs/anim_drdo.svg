<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="100%" height="100%">
  <defs>
    <style>
      .bg { fill: #000; }
      .radar-line { fill: none; stroke: #003300; stroke-width: 1.5; }
      .text-title { font-family: 'Courier New', monospace; font-size: 36px; fill: #00ff00; font-weight: bold; letter-spacing: 5px; }
      .text-sub { font-family: 'Courier New', monospace; font-size: 16px; fill: #008800; }
      .text-warn { font-family: 'Courier New', monospace; font-size: 16px; fill: #ff0033; font-weight: bold; }
      @keyframes blinkOp { 0%, 100% { opacity: 0; } 50% { opacity: 1; } }
    </style>
    <linearGradient id="radarSweep" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00ff00" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#00ff00" stop-opacity="0"/>
    </linearGradient>
    <pattern id="tactical-grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M30 0 L0 0 L0 30" fill="none" stroke="#001a00" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="300" class="bg"/>
  <rect width="1200" height="300" fill="url(#tactical-grid)"/>

  <!-- Left Tactical Info -->
  <g transform="translate(50, 80)">
    <text y="0" class="text-title">COMMAND NEXUS</text>
    <text y="40" class="text-sub">> AUTH: DEMO_MODE</text>
    <text y="70" class="text-sub">> CLASSIFICATION: UNCLASSIFIED</text>
    <text y="100" class="text-sub">> REGION: SECTOR 7G</text>
  </g>

  <!-- Center Radar -->
  <g transform="translate(600, 150)">
    <!-- Radar Rings -->
    <circle cx="0" cy="0" r="130" class="radar-line"/>
    <circle cx="0" cy="0" r="90" class="radar-line" stroke-dasharray="10 5"/>
    <circle cx="0" cy="0" r="50" class="radar-line"/>
    
    <!-- Crosshairs -->
    <path d="M -150 0 L 150 0 M 0 -150 L 0 150" class="radar-line"/>
    
    <!-- Rotating Sweep -->
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="4s" repeatCount="indefinite"/>
      <path d="M 0 0 L 0 -130 A 130 130 0 0 1 130 0 Z" fill="url(#radarSweep)"/>
    </g>
    
    <!-- Targets -->
    <circle cx="60" cy="-60" r="5" fill="#ff0033" style="animation: blinkOp 4s infinite;"/>
    <circle cx="-80" cy="30" r="4" fill="#00ffff" style="animation: blinkOp 4s infinite 1.5s;"/>
    <text x="70" y="-60" class="text-warn" style="font-size:12px;">UAV-99</text>
  </g>

  <!-- Right Diagnostics -->
  <g transform="translate(900, 80)">
    <rect x="-20" y="-30" width="250" height="160" fill="none" stroke="#003300" stroke-width="2"/>
    <text y="0" class="text-sub" style="fill:#00ff00; font-weight:bold;">SYS_DIAGNOSTICS</text>
    <text y="40" class="text-sub">> VISION:  [ONLINE]</text>
    <text y="70" class="text-sub">> ORBITAL: [SYNCED]</text>
    <text y="100" class="text-sub">> FUSION:  [ACTIVE]</text>
  </g>
</svg>
